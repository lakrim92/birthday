<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="assets/images/favicon.png" sizes="32x32">
    <link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png" sizes="180x180">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <title>Joyeux Anniversaire Jean</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #0a0a1a;
            font-family: 'Lato', sans-serif;
        }

        /* Fond étoilé animé */
        #stars-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* Halo de lumière central */
        .glow-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
            background:
                radial-gradient(ellipse 70% 50% at 50% 50%, rgba(180, 100, 255, 0.12) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 30% 70%, rgba(255, 180, 50, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 70% 30%, rgba(255, 80, 120, 0.08) 0%, transparent 60%);
            animation: glowPulse 6s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Confetti canvas */
        #confetti-canvas {
            position: fixed;
            inset: 0;
            z-index: 5;
            pointer-events: none;
        }

        /* Contenu principal */
        .scene {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 5vw;
            /* Réserve de l'espace pour la signature en bas */
            padding-bottom: clamp(4rem, 12vh, 7rem);
            padding-top: clamp(1rem, 4vh, 3rem);
        }

        /* Badge anniversaire */
        .badge {
            font-family: 'Lato', sans-serif;
            font-weight: 300;
            font-size: clamp(0.82rem, 2vw, 1rem);
            letter-spacing: clamp(0.2em, 0.5vw, 0.5em);
            text-transform: uppercase;
            color: rgba(255, 200, 100, 0.7);
            opacity: 0;
            animation: fadeSlideDown 1s ease-out 0.3s forwards;
            margin-bottom: clamp(0.4em, 1.5vh, 0.8em);
            white-space: nowrap;
            text-align: center;
        }

        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Ligne décorative */
        .divider {
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,200,100,0.6), transparent);
            animation: expandLine 1.2s ease-out 0.8s forwards;
            margin-bottom: clamp(0.3em, 1vh, 0.6em);
            max-width: 90vw;
        }

        @keyframes expandLine {
            to { width: min(40vw, 500px); }
        }

        /* Nom principal */
        .name-wrap {
            overflow: visible;
            margin-bottom: clamp(0.1em, 0.5vh, 0.2em);
            max-width: 95vw;
            text-align: center;
        }

        .main-name {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            /*
              "Jean" est court (4 lettres) : on peut monter à 22vw sans déborder.
              clamp(min, préféré, max) avec vw comme unité fluide.
            */
            font-size: clamp(3.5rem, 22vw, 14rem);
            line-height: 1;
            background: linear-gradient(135deg,
                #f5d26e 0%,
                #ffffff 30%,
                #f5a3c7 55%,
                #ffffff 75%,
                #f5d26e 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 5s linear infinite, nameAppear 1s cubic-bezier(.22,1,.36,1) 0.5s both;
            filter: drop-shadow(0 0 40px rgba(245, 163, 199, 0.4)) drop-shadow(0 0 80px rgba(245, 210, 110, 0.2));
            letter-spacing: -0.02em;
            white-space: nowrap;
            padding-bottom: 0.15em;
        }

        @keyframes shimmer {
            0%   { background-position: 200% 50%; }
            100% { background-position: -200% 50%; }
        }

        @keyframes nameAppear {
            from { opacity: 0; transform: scale(0.85) translateY(30px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Médaillon 70 ans */
        .age-badge {
            display: flex;
            align-items: center;
            gap: clamp(0.5em, 1.5vw, 1em);
            opacity: 0;
            animation: fadeSlideUp 1s ease-out 1s forwards;
            margin-top: clamp(0.2em, 0.8vh, 0.4em);
        }

        .age-badge .ornament {
            flex: 1;
            height: 1px;
            max-width: clamp(30px, 8vw, 80px);
            background: linear-gradient(90deg, transparent, rgba(245, 210, 110, 0.5));
        }
        .age-badge .ornament.right {
            background: linear-gradient(90deg, rgba(245, 210, 110, 0.5), transparent);
        }

        .age-number {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: clamp(2rem, 4vw, 2.8rem);
            background: linear-gradient(135deg, #c8922a 0%, #f5d26e 40%, #fff8dc 60%, #f5d26e 80%, #c8922a 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 5s linear infinite;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .age-label {
            font-family: 'Lato', sans-serif;
            font-weight: 300;
            font-size: clamp(0.8rem, 1.5vw, 0.85rem);
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: rgba(245, 210, 110, 0.65);
            white-space: nowrap;
        }

        /* Ligne décorative basse */
        .divider-bottom {
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(245,163,199,0.5), transparent);
            animation: expandLine 1.2s ease-out 1.2s forwards;
            margin-top: clamp(0.3em, 1vh, 0.5em);
            margin-bottom: clamp(0.4em, 1.5vh, 0.8em);
            max-width: 90vw;
        }

        /* Sous-titre */
        .subtitle {
            font-family: 'Lato', sans-serif;
            font-weight: 300;
            font-size: clamp(0.88rem, 1.8vw, 1rem);
            letter-spacing: clamp(0.15em, 0.4vw, 0.4em);
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.55);
            opacity: 0;
            animation: fadeSlideUp 1s ease-out 1.5s forwards;
            text-align: center;
            white-space: nowrap;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Émojis décoratifs flottants */
        .floating-emojis {
            position: fixed;
            inset: 0;
            z-index: 6;
            pointer-events: none;
            overflow: hidden;
        }

        .emoji-float {
            position: absolute;
            font-size: clamp(1rem, 3vw, 2rem);
            opacity: 0;
            animation: floatUp var(--dur) ease-in var(--delay) infinite;
            left: var(--x);
            bottom: -10%;
            filter: drop-shadow(0 0 6px rgba(255,255,255,0.3));
        }

        @keyframes floatUp {
            0%   { opacity: 0; transform: translateY(0) rotate(0deg) scale(0.8); }
            10%  { opacity: 0.9; }
            80%  { opacity: 0.7; }
            100% { opacity: 0; transform: translateY(-110vh) rotate(360deg) scale(1.2); }
        }

        /* Signature en bas */
        .from {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: clamp(0.6rem, 2vh, 1.2rem) 1rem;
            text-align: center;
            z-index: 20;
            opacity: 0;
            animation: fadeSlideUp 1s ease-out 2s forwards;
            background: linear-gradient(to top, rgba(10,10,26,0.7) 0%, transparent 100%);
        }

        .from-label {
            font-size: clamp(0.65rem, 1.3vw, 0.75rem);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            display: block;
            margin-bottom: 0.25em;
        }

        .from-names {
            font-family: 'Lato', sans-serif;
            font-weight: 300;
            font-size: clamp(1rem, 2.2vw, 1.15rem);
            color: rgba(255, 210, 120, 0.85);
            letter-spacing: 0.05em;
        }

        /* Bouton musique */
        #music-toggle {
            position: fixed;
            bottom: clamp(0.5rem, 2vh, 1.2rem);
            right: clamp(0.5rem, 2vw, 1.2rem);
            z-index: 30;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            width: clamp(36px, 6vmin, 48px);
            height: clamp(36px, 6vmin, 48px);
            font-size: clamp(1rem, 2.5vmin, 1.3rem);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            transition: background 0.3s, transform 0.2s;
        }

        #music-toggle:hover {
            background: rgba(255,255,255,0.18);
            transform: scale(1.1);
        }

        /* ── Breakpoints ciblés ── */

        /* Très petits écrans (< 360px) */
        @media (max-width: 360px) {
            .badge   { letter-spacing: 0.15em; font-size: 0.75rem; }
            .subtitle { letter-spacing: 0.1em; font-size: 0.8rem; }
            .main-name { font-size: clamp(2.8rem, 22vw, 5rem); }
        }

        /* Paysage mobile (hauteur < 500px) */
        @media (max-height: 500px) {
            .scene { padding-bottom: clamp(2.5rem, 10vh, 4rem); gap: 0; }
            .badge { margin-bottom: 0.3em; }
            .divider-bottom { margin-top: 0.2em; margin-bottom: 0.3em; }
            .main-name { font-size: clamp(2.5rem, 14vh, 6rem); }
            .subtitle { display: none; }
        }

        /* Tablette portrait */
        @media (min-width: 600px) and (max-width: 1024px) {
            .main-name { font-size: clamp(6rem, 20vw, 11rem); }
        }

        /* Grand écran / TV */
        @media (min-width: 1600px) {
            .main-name { font-size: clamp(10rem, 15vw, 18rem); }
        }
    </style>
</head>
<body>

    <canvas id="stars-canvas"></canvas>
    <div class="glow-bg"></div>
    <canvas id="confetti-canvas"></canvas>

    <!-- Émojis flottants -->
    <div class="floating-emojis" id="floating-emojis"></div>

    <div class="scene">
        <p class="badge">✦ &nbsp; Joyeux Anniversaire &nbsp; ✦</p>
        <div class="divider"></div>
        <div class="name-wrap">
            <h1 class="main-name">Jean</h1>
        </div>
        <div class="age-badge">
            <span class="ornament"></span>
            <span class="age-number">70</span>
            <span class="age-label">ans</span>
            <span class="ornament right"></span>
        </div>
        <div class="divider-bottom"></div>
        <p class="subtitle">Que cette journée soit inoubliable</p>
    </div>

    <div class="from">
        <span class="from-label">avec tout notre amour</span>
        <span class="from-names">Georges, Laure, Lili &amp; Arthur</span>
    </div>

    <audio id="birthday-music" loop>
        <source src="assets/music/happy-birthday-254480.mp3" type="audio/mpeg">
    </audio>
    <button id="music-toggle" onclick="toggleMusic()" aria-label="Musique">🎵</button>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
    /* ── Étoiles ── */
    (function () {
        const canvas = document.getElementById('stars-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            const count = Math.floor((canvas.width * canvas.height) / 3500);
            stars = Array.from({ length: count }, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 1.5 + 0.3,
                alpha: Math.random(),
                dAlpha: (Math.random() * 0.008 + 0.002) * (Math.random() < 0.5 ? 1 : -1),
            }));
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (const s of stars) {
                s.alpha += s.dAlpha;
                if (s.alpha <= 0 || s.alpha >= 1) s.dAlpha *= -1;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${s.alpha.toFixed(2)})`;
                ctx.fill();
            }
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);
        resize();
        draw();
    })();

    /* ── Émojis flottants ── */
    (function () {
        const emojis = ['🎂', '🎉', '🎈', '✨', '🌸', '💫', '🥂', '🎁', '💖', '🌟'];
        const container = document.getElementById('floating-emojis');
        for (let i = 0; i < 18; i++) {
            const el = document.createElement('div');
            el.className = 'emoji-float';
            el.textContent = emojis[i % emojis.length];
            el.style.setProperty('--x', (Math.random() * 95 + 1) + '%');
            el.style.setProperty('--dur', (Math.random() * 10 + 10) + 's');
            el.style.setProperty('--delay', (Math.random() * 12) + 's');
            container.appendChild(el);
        }
    })();

    /* ── Confetti ── */
    function burst() {
        const colors = ['#f5d26e', '#f5a3c7', '#a78bfa', '#6ee7b7', '#fff'];
        confetti({
            particleCount: 60,
            spread: 80,
            origin: { x: Math.random(), y: Math.random() * 0.4 + 0.1 },
            colors,
            scalar: 1.1,
            gravity: 0.7,
        });
    }

    setTimeout(() => burst(), 1000);
    setTimeout(() => burst(), 2200);
    setInterval(burst, 4000);

    /* ── Musique ── */
    const music = document.getElementById('birthday-music');
    const btn = document.getElementById('music-toggle');
    let playing = false;

    function startMusic() {
        music.volume = 0.4;
        music.play().then(() => {
            playing = true;
            btn.textContent = '🔇';
        }).catch(() => {});
    }

    function toggleMusic() {
        if (playing) {
            music.pause();
            btn.textContent = '🎵';
        } else {
            music.play();
            btn.textContent = '🔇';
        }
        playing = !playing;
    }

    // Autoplay direct (le script s'exécute après le DOM)
    startMusic();

    // Fallback si l'autoplay est bloqué par le navigateur : démarre au premier geste
    function onFirstInteraction() {
        if (!playing) startMusic();
        document.removeEventListener('click',      onFirstInteraction);
        document.removeEventListener('touchstart', onFirstInteraction);
    }
    document.addEventListener('click',      onFirstInteraction);
    document.addEventListener('touchstart', onFirstInteraction);
    </script>
</body>
</html>
